<!doctype html>
<html>
  <head>
    <title>Article Browser</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h1 class="mb-4">Article Browser</h1>

      <form class="row g-2 mb-4">
        <div class="col-md-4">
          <input
            type="text"
            name="q"
            class="form-control"
            placeholder="Search title..."
            value="{{ keyword }}"
          />
        </div>
        <div class="col-md-3">
          <select name="category" class="form-select">
            <option value="">All categories</option>
            <option
              value="science"
              {%
              if
              category=""
              ="science"
              %}selected{%
              endif
              %}
            >
              Science
            </option>
            <option
              value="technology"
              {%
              if
              category=""
              ="technology"
              %}selected{%
              endif
              %}
            >
              Technology
            </option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100">Filter</button>
        </div>
      </form>

      <div class="row">
        {% for article in articles %}
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">{{ article.title }}</h5>
              <p class="text-muted mb-2">
                AID: {{ article.aid }} | {{ article.category }}
              </p>
              <p class="card-text">
                {{ article.abstract[:180] if article.abstract else '' }}...
              </p>
              <a
                href="/article/{{ article.aid }}"
                class="btn btn-outline-primary btn-sm"
                >View</a
              >
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
